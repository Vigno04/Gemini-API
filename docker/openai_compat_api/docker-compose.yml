services:
  openai-compat:
    image: ${OPENAI_COMPAT_IMAGE:-ghcr.io/hanaokayuzu/gemini-api-openai-compat:develop}
    container_name: gemini-openai-compat
    environment:
      GEMINI_SECURE_1PSID: ${GEMINI_SECURE_1PSID:-}
      GEMINI_SECURE_1PSIDTS: ${GEMINI_SECURE_1PSIDTS:-}
      GEMINI_PROXY: ${GEMINI_PROXY:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_DEFAULT_MODEL: ${OPENAI_COMPAT_DEFAULT_MODEL:-gemini-3-flash}
      GEMINI_COOKIE_PATH: ${GEMINI_COOKIE_PATH:-/data/cookies}
    ports:
      - "8080:8080"
    volumes:
      - ./cookies:${GEMINI_COOKIE_PATH:-/data/cookies}
    restart: unless-stopped
